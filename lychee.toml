# Link-checker for README/docs sources (prek) and built Sphinx HTML (CI).
# Local HTML:  lychee --config lychee.toml --no-progress 'docs/build/**/*.html'
# Sources:     lychee --config lychee.toml --no-progress README.md docs/orgmode docs/source

max_retries = 3
retry_wait_time = 2
timeout = 20
accept = ["200..=206", "403", "429"]
user_agent = "Mozilla/5.0 (compatible; lychee; +https://github.com/lycheeverse/lychee)"
no_progress = true

exclude = [
  '^mailto:',
  '^https?://localhost',
  '^https?://127\.0\.0\.1',
  # Anti-bot / unstable under automated HEAD
  '^https://doi\.org/',
  '^https://hdl\.handle\.net/',
  # Live site lags deploy; CI checks local HTML for internal links
  '^https://capnp-fortran\.rgoswami\.me/',
  '^https://capnp-fortran\.pages\.dev/',
  # Edit-this-page / blob links to main may 404 on PR branches
  '^https://github\.com/HaoZeke/capnp-fortran/blob/',
  # Theme / analytics vendor
  '^https?://antics-api\.turtletech\.us/',
  '^https?://analytics\.turtletech\.us/',
  '^https?://umami\.is/?$',
  '^https?://fonts\.gstatic\.com/',
  '^https?://fonts\.googleapis\.com/',
  # Badge CDN flaky under automated HEAD
  '^https://img\.shields\.io/',
]

exclude_path = [
  "docs/build/_static/.*",
  "docs/build/searchindex.js",
]
