# Instrumented fpm suite + gcov for src/. FOSS-friendly:
# GitHub artifact + job summary + sticky PR comment. No third-party account.
name: coverage

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          environments: coverage
      - name: instrumented tests + gcov report
        run: pixi run -e coverage coverage
      - name: upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage-report/summary.txt
            coverage-report/console.txt
            coverage-report/coverage.xml
            coverage-report/coverage.lcov
            coverage-report/index.html
          if-no-files-found: error
      - name: job summary
        run: |
          test -s coverage-report/summary.txt
          test -s coverage-report/coverage.lcov
          grep -q '^DA:' coverage-report/coverage.lcov
          {
            echo '## Coverage (src/)'
            echo
            echo '```'
            cat coverage-report/summary.txt
            echo '```'
            echo
            echo 'Download the **coverage-report** artifact for LCOV/HTML.'
            echo 'Local: `pixi run -e coverage coverage`.'
          } | tee -a "$GITHUB_STEP_SUMMARY"
      - name: sticky PR coverage comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: capnp-fortran-coverage
          path: coverage-report/summary.txt
