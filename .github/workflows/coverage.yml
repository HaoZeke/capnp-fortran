# Instrumented fpm suite + gcov report for src/ only. Isolated from the main
# `ci` test job so report tooling cannot block green test merges.
name: coverage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          environments: coverage
      - name: instrumented tests + gcov summary
        run: pixi run -e coverage coverage
      - name: upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage-report/summary.txt
            coverage-report/console.txt
            coverage-report/coverage.xml
            coverage-report/index.html
          if-no-files-found: error
      - name: print summary
        run: |
          test -s coverage-report/summary.txt
          grep -q '^src/' coverage-report/summary.txt
          cat coverage-report/summary.txt
