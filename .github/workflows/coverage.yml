# Instrumented fpm suite + gcov report for src/, upload to Codecov.
# Isolated from the main `ci` test job.
name: coverage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          environments: coverage
      - name: instrumented tests + gcov report
        run: pixi run -e coverage coverage
      - name: upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage-report/summary.txt
            coverage-report/console.txt
            coverage-report/coverage.xml
            coverage-report/coverage.lcov
            coverage-report/index.html
          if-no-files-found: error
      - name: print summary
        run: |
          test -s coverage-report/summary.txt
          test -s coverage-report/coverage.lcov
          grep -q '^DA:' coverage-report/coverage.lcov
          grep -q '^src/' coverage-report/summary.txt
          cat coverage-report/summary.txt
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage-report/coverage.lcov
          flags: unittests
          name: capnp-fortran-src
          # Public OSS: set repo secret CODECOV_TOKEN (Codecov → project settings).
          # Without the token, this step fails soft so artifact coverage still ships.
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true
