# Build Sphinx docs; lychee on HTML; deploy main to Cloudflare Pages
# (capnp-fortran.rgoswami.me). PR builds upload a documentation artifact
# for HaoZeke/doc-previewer (doc_commenter.yml).
name: Documentation

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - "CHANGELOG.md"
      - "pixi.toml"
      - "pixi.lock"
      - "lychee.toml"
      - ".github/workflows/docs.yml"
      - ".github/workflows/doc_commenter.yml"
  pull_request:
    paths:
      - "docs/**"
      - "README.md"
      - "CHANGELOG.md"
      - "pixi.toml"
      - "lychee.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          environments: docs
          locked: false

      - name: Build documentation site
        run: pixi run -e docs docs

      - name: Install lychee
        uses: taiki-e/install-action@v2
        with:
          tool: lychee@0.24.2

      - name: Link check (lychee on built HTML)
        run: lychee --config lychee.toml --no-progress 'docs/build/**/*.html' README.md

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/build
          retention-days: 14

      - name: Ensure Cloudflare Pages project exists
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'workflow_dispatch'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3 pages project create capnp-fortran --production-branch=main || true

      - name: Deploy to Cloudflare Pages
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'workflow_dispatch'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/build --project-name=capnp-fortran --branch=main
