[workspace]
name = "capnp-fortran"
description = "Native modern-Fortran Cap'n Proto implementation"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
fypp = ">=3.2"
fpm = ">=0.10"
gfortran = ">=13"
capnproto = ">=1.0"

[feature.interop.dependencies]
meson = ">=1.4"
ninja = "*"
cmocka = "*"
pkg-config = "*"
c-compiler = "*"
cxx-compiler = "*"
capnproto = ">=1.0"

[feature.docs]
dependencies = { python = ">=3.10", sphinx = ">=7,<9", graphviz = "*", emacs = "*" }
[feature.docs.pypi-dependencies]
shibuya = ">=2026.1.9, <2027"
sphinxcontrib-bibtex = ">=2.6, <3"
sphinx-copybutton = ">=0.5.2, <1"
sphinx-design = ">=0.6, <1"
myst-parser = ">=4.0, <5"
sphinxcontrib-mermaid = ">=1.0, <2"
[feature.docs.tasks]
orgbld = { cmd = "emacs --batch -l docs/export.el", description = "Export docs/orgmode/*.org to docs/source/*.rst" }
docs = { cmd = "sphinx-build docs/source docs/build -b html", depends-on = ["orgbld"], description = "Build the Sphinx HTML docs" }
docs-clean = { cmd = "rm -rf docs/build", description = "Remove the built docs" }
linkcheck = { cmd = "lychee --config lychee.toml --no-progress 'docs/build/**/*.html' README.md", depends-on = ["docs"], description = "Lychee on built HTML (same as Documentation workflow)" }

[environments]
default = []
interop = ["interop"]
docs = ["docs"]

[tasks]
gen = { cmd = "bash scripts/fypp-gen.sh" }
build = { cmd = "fpm build" }
test = { cmd = "fpm test" }
prek = { cmd = "prek run -a", description = "Run all prek hooks" }
