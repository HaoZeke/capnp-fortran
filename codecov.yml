# Free for public GitHub repos. CI uploads when CODECOV_TOKEN is set.
codecov:
  require_ci_to_pass: false

coverage:
  status:
    project:
      default:
        informational: true
        target: auto
        threshold: 2%
    patch:
      default:
        informational: true
        target: auto
        threshold: 2%

comment:
  layout: "reach,diff,flags,files"
  behavior: default

ignore:
  - "test/**"
  - "app/**"
  - "docs/**"
  - "cmake/**"
