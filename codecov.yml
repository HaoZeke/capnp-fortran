# Unused by default CI (FOSS path uses GitHub artifact + PR comment).
# Keep if you later opt into Codecov with CODECOV_TOKEN.
codecov:
  require_ci_to_pass: false
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true
ignore:
  - "test/**"
  - "app/**"
  - "docs/**"
  - "cmake/**"
