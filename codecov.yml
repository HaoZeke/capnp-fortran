# https://docs.codecov.com/docs/codecov-yaml
codecov:
  require_ci_to_pass: false

coverage:
  status:
    project:
      default:
        # Informational: do not fail CI on overall % drift.
        target: auto
        threshold: 2%
        if_ci_failed: success
    patch:
      default:
        target: auto
        threshold: 2%
        if_ci_failed: success

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

ignore:
  - "test/**"
  - "app/**"
  - "docs/**"
  - "cmake/**"
